<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Basemap comparison — PCS Housing Finder</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<style>
  body { margin: 0; font-family: "Segoe UI", system-ui, sans-serif; background: #111; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; padding: 6px; }
  .cell { position: relative; height: 44vh; min-height: 260px; }
  .cell .map { position: absolute; inset: 0; }
  .tag {
    position: absolute; top: 8px; left: 8px; z-index: 5;
    background: rgba(18, 32, 58, 0.88); color: #fff;
    padding: 4px 10px; border-radius: 6px; font-size: 13px; font-weight: 600;
  }
  .tag small { display: block; font-weight: 400; color: #cfd6e2; }
</style>
</head>
<body>
<div class="grid" id="grid"></div>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
const CENTER = [-79.01, 35.08];
const ZOOM = 10.3;

function raster(tiles, attribution) {
  return {
    version: 8,
    sources: { base: { type: "raster", tiles: [tiles], tileSize: 256, attribution } },
    layers: [{ id: "base", type: "raster", source: "base" }],
  };
}

const OPTIONS = [
  { name: "1 · OSM Standard (current)", note: "busy but familiar",
    style: raster("https://tile.openstreetmap.org/{z}/{x}/{y}.png", "© OpenStreetMap") },
  { name: "2 · Carto Positron", note: "minimal light gray — overlays pop",
    style: raster("https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png", "© OSM © CARTO") },
  { name: "3 · Carto Voyager", note: "modern, gentle color",
    style: raster("https://a.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png", "© OSM © CARTO") },
  { name: "4 · Carto Dark Matter", note: "dark mode",
    style: raster("https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png", "© OSM © CARTO") },
  { name: "5 · OpenFreeMap Liberty", note: "crisp vector, no key",
    style: "https://tiles.openfreemap.org/styles/liberty" },
  { name: "6 · Esri World Imagery", note: "satellite photo",
    style: raster("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", "© Esri") },
];

const grid = document.getElementById("grid");
for (const [i, opt] of OPTIONS.entries()) {
  const cell = document.createElement("div");
  cell.className = "cell";
  cell.innerHTML = `<div class="tag">${opt.name}<small>${opt.note}</small></div><div class="map" id="m${i}"></div>`;
  grid.appendChild(cell);
  const map = new maplibregl.Map({ container: `m${i}`, style: opt.style, center: CENTER, zoom: ZOOM, attributionControl: { compact: true } });
  // Demo overlays so each basemap can be judged with our layers on top:
  map.on("load", () => {
    new maplibregl.Marker({ color: "#c9a227" }).setLngLat([-79.01, 35.13]).addTo(map);
    new maplibregl.Marker({ color: "#1b2a41" }).setLngLat([-78.93, 35.03]).addTo(map);
    map.addSource("zone", { type: "geojson", data: { type: "Feature", geometry: { type: "Polygon",
      coordinates: [[[-79.14, 35.02], [-78.86, 35.02], [-78.82, 35.12], [-79.05, 35.19], [-79.18, 35.12], [-79.14, 35.02]]] } } });
    map.addLayer({ id: "zone-f", type: "fill", source: "zone", paint: { "fill-color": "#c9a227", "fill-opacity": 0.18 } });
    map.addLayer({ id: "zone-l", type: "line", source: "zone", paint: { "line-color": "#c9a227", "line-width": 2, "line-opacity": 0.7 } });
  });
}
</script>
</body>
</html>
