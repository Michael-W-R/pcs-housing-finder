<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 96">
  <!-- PCS Scout — moving box with a location pin (Army gold #FFCC01 / black) -->
  <!-- motion dashes -->
  <g stroke="#FFCC01" stroke-width="5" stroke-linecap="round">
    <line x1="4" y1="56" x2="13" y2="56"/>
    <line x1="2" y1="66" x2="11" y2="66"/>
    <line x1="4" y1="76" x2="13" y2="76"/>
  </g>
  <!-- box interior (open top) -->
  <polygon points="24,50 80,50 74,40 30,40" fill="#000000"/>
  <!-- open flaps -->
  <polygon points="24,50 30,40 12,33 6,43" fill="#FFCC01" stroke="#000000" stroke-width="3.5" stroke-linejoin="round"/>
  <polygon points="80,50 74,40 92,33 98,43" fill="#FFCC01" stroke="#000000" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- box body -->
  <rect x="24" y="50" width="56" height="36" fill="#FFCC01" stroke="#000000" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- tape seam -->
  <line x1="52" y1="50" x2="52" y2="86" stroke="#000000" stroke-width="3" opacity="0.25"/>
  <!-- map pin rising from the box -->
  <path d="M52 8 C43 8 36 15 36 24 C36 34 52 48 52 48 C52 48 68 34 68 24 C68 15 61 8 52 8 Z"
        fill="#000000" stroke="#FFCC01" stroke-width="2.5"/>
  <circle cx="52" cy="23.5" r="6" fill="#FFCC01"/>
</svg>
